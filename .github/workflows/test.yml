on: [push, pull_request]
name: Test
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      CGO_ENABLED: 0
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Install Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
    - name: "[macos] install libheif"
      if: runner.os == 'macOS'
      run: brew install libheif
    - name: "[linux] install libheif"
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y libheif-dev libheif1 libheif-plugin-libde265
    - name: "[windows] install libheif"
      if: runner.os == 'Windows'
      run: C:\msys64\usr\bin\pacman -Sy --noconfirm --needed mingw-w64-x86_64-libheif
    - name: "[windows] add libheif to PATH"
      if: runner.os == 'Windows'
      run: Add-Content $env:GITHUB_PATH "C:\msys64\mingw64\bin"
    - name: Test
      run: go test -v -bench=. -benchtime=1x

  # Test that we can at least cross-compile the package & tests on a variety
  # of other platforms.
  cross-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # don't abort the entire matrix if one element fails
      matrix:
        include:
          # Note: {linux,windows,darwin}/amd64 is not in this matrix, because those
          # are tested more exhaustively in the 'test' job above.
          - goos: linux
            goarch: "386" # quoted for yaml
          - goos: linux
            goarch: mips
          - goos: linux
            goarch: mipsle
          - goos: linux
            goarch: loong64
          - goos: linux
            goarch: arm
            goarm: "5"
          - goos: linux
            goarch: arm
            goarm: "7"
          # Windows
          - goos: windows
            goarch: arm64
          # BSDs
          - goos: freebsd
            goarch: amd64
          - goos: openbsd
            goarch: amd64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Install Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
    - name: build
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        GOARM: ${{ matrix.goarm }}
        CGO_ENABLED: "0"
      run: |
        go install ./...
        go test --exec=true ./...

